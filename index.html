<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bodypump Tracker</title>
  
  <!-- Bulletproof URL-codiertes SVG Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e293b'/%3E%3Cpath d='M10 45h80v10H10z' fill='%23cbd5e1'/%3E%3Crect x='20' y='25' width='12' height='50' rx='3' fill='%23ef4444'/%3E%3Crect x='68' y='25' width='12' height='50' rx='3' fill='%23ef4444'/%3E%3Crect x='34' y='30' width='8' height='40' rx='2' fill='%2394a3b8'/%3E%3Crect x='58' y='30' width='8' height='40' rx='2' fill='%2394a3b8'/%3E%3C/svg%3E" type="image/svg+xml">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Firebase Initialisierung (Wird in der Live-Umgebung automatisch befüllt)
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "", // Wenn du es auf GitHub nutzt, hier deine eigenen Firebase-Daten eintragen
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'bodypump-tracker-v1';

    const { useState, useEffect } = React;

    const MUSCLES = {
      CHEST: 'Brust', BACK: 'Rücken', LOWER_BACK: 'Unt. Rücken', TRAPS: 'Nacken', 
      SHOULDERS: 'Schultern', BICEPS: 'Bizeps', TRICEPS: 'Trizeps', ABS: 'Bauch', 
      GLUTES: 'Gesäß', QUADS: 'Beine (v)', HAMSTRINGS: 'Beine (h)', CALVES: 'Waden', ALL: 'Ganzkörper'
    };

    const TRACKS = [
      { id: 1, name: '1. Aufwärmen', desc: 'Leichtes Gewicht für den gesamten Körper.', targets: ['ALL'] },
      { id: 2, name: '2. Kniebeugen', desc: 'Beine und Po. Maximales Gewicht.', targets: ['QUADS', 'GLUTES', 'HAMSTRINGS'] },
      { id: 3, name: '3. Brust', desc: 'Bankdrücken oder Push-ups.', targets: ['CHEST', 'SHOULDERS', 'TRICEPS'] },
      { id: 4, name: '4. Rücken', desc: 'Kreuzheben und Rudern.', targets: ['BACK', 'LOWER_BACK', 'TRAPS', 'GLUTES'] },
      { id: 5, name: '5. Trizeps', desc: 'Armrückseite (Dips, Kickbacks).', targets: ['TRICEPS'] },
      { id: 6, name: '6. Bizeps', desc: 'Curls für die Armvorderseite.', targets: ['BICEPS'] },
      { id: 7, name: '7. Ausfallschritte', desc: 'Fokus auf Beine und Gesäß.', targets: ['QUADS', 'GLUTES', 'HAMSTRINGS'] },
      { id: 8, name: '8. Schultern', desc: 'Überkopfdrücken und Seitheben.', targets: ['SHOULDERS', 'TRAPS'] },
      { id: 9, name: '9. Rumpf', desc: 'Crunches und Planks.', targets: ['ABS', 'LOWER_BACK'] },
      { id: 10, name: '10. Cooldown', desc: 'Dehnen und Entspannen.', targets: ['ALL'] },
    ];

    const FrontBody = ({ targets }) => {
      const getFill = (m) => targets.includes('ALL') || targets.includes(m) ? '#ef4444' : '#e2e8f0';
      const baseStyle = { transition: 'fill 0.3s ease', stroke: '#ffffff', strokeWidth: '1.5' };
      return (
        <svg viewBox="0 0 100 220" className="w-full h-auto drop-shadow-sm">
          <circle cx="50" cy="16" r="12" fill="#cbd5e1" style={baseStyle} />
          <rect x="45" y="25" width="10" height="10" rx="2" fill="#cbd5e1" style={baseStyle} />
          <rect x="26" y="35" width="16" height="16" rx="6" fill={getFill('SHOULDERS')} style={baseStyle} />
          <rect x="58" y="35" width="16" height="16" rx="6" fill={getFill('SHOULDERS')} style={baseStyle} />
          <rect x="34" y="40" width="15" height="18" rx="4" fill={getFill('CHEST')} style={baseStyle} />
          <rect x="51" y="40" width="15" height="18" rx="4" fill={getFill('CHEST')} style={baseStyle} />
          <rect x="38" y="60" width="11" height="10" rx="2" fill={getFill('ABS')} style={baseStyle} />
          <rect x="51" y="60" width="11" height="10" rx="2" fill={getFill('ABS')} style={baseStyle} />
          <rect x="33" y="60" width="4" height="34" rx="2" fill={getFill('ABS')} style={baseStyle} />
          <rect x="63" y="60" width="4" height="34" rx="2" fill={getFill('ABS')} style={baseStyle} />
          <rect x="22" y="53" width="12" height="24" rx="5" fill={getFill('BICEPS')} style={baseStyle} />
          <rect x="66" y="53" width="12" height="24" rx="5" fill={getFill('BICEPS')} style={baseStyle} />
          <rect x="34" y="112" width="15" height="45" rx="6" fill={getFill('QUADS')} style={baseStyle} />
          <rect x="51" y="112" width="15" height="45" rx="6" fill={getFill('QUADS')} style={baseStyle} />
          <rect x="36" y="160" width="11" height="40" rx="4" fill={getFill('CALVES')} style={baseStyle} />
          <rect x="53" y="160" width="11" height="40" rx="4" fill={getFill('CALVES')} style={baseStyle} />
        </svg>
      );
    };

    const BackBody = ({ targets }) => {
      const getFill = (m) => targets.includes('ALL') || targets.includes(m) ? '#ef4444' : '#e2e8f0';
      const baseStyle = { transition: 'fill 0.3s ease', stroke: '#ffffff', strokeWidth: '1.5' };
      return (
        <svg viewBox="0 0 100 220" className="w-full h-auto drop-shadow-sm">
          <circle cx="50" cy="16" r="12" fill="#cbd5e1" style={baseStyle} />
          <polygon points="45,26 55,26 62,38 38,38" fill={getFill('TRAPS')} style={baseStyle} />
          <rect x="26" y="35" width="16" height="16" rx="6" fill={getFill('SHOULDERS')} style={baseStyle} />
          <rect x="58" y="35" width="16" height="16" rx="6" fill={getFill('SHOULDERS')} style={baseStyle} />
          <polygon points="34,40 66,40 62,80 38,80" fill={getFill('BACK')} style={baseStyle} />
          <rect x="38" y="82" width="24" height="15" rx="3" fill={getFill('LOWER_BACK')} style={baseStyle} />
          <rect x="22" y="53" width="12" height="26" rx="5" fill={getFill('TRICEPS')} style={baseStyle} />
          <rect x="66" y="53" width="12" height="26" rx="5" fill={getFill('TRICEPS')} style={baseStyle} />
          <rect x="33" y="100" width="16" height="24" rx="8" fill={getFill('GLUTES')} style={baseStyle} />
          <rect x="51" y="100" width="16" height="24" rx="8" fill={getFill('GLUTES')} style={baseStyle} />
          <rect x="34" y="126" width="15" height="40" rx="6" fill={getFill('HAMSTRINGS')} style={baseStyle} />
          <rect x="51" y="126" width="15" height="40" rx="6" fill={getFill('HAMSTRINGS')} style={baseStyle} />
          <rect x="35" y="168" width="13" height="35" rx="6" fill={getFill('CALVES')} style={baseStyle} />
          <rect x="52" y="168" width="13" height="35" rx="6" fill={getFill('CALVES')} style={baseStyle} />
        </svg>
      );
    };

    function App() {
      const [activeTrackId, setActiveTrackId] = useState(1);
      const [user, setUser] = useState(null);
      const [weights, setWeights] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      const activeTrack = TRACKS.find(t => t.id === activeTrackId);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) { console.error("Auth error:", err); }
        };
        initAuth();
        return onAuthStateChanged(auth, setUser);
      }, []);

      useEffect(() => {
        if (!user) return;
        const weightsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'weights');
        return onSnapshot(weightsRef, (snapshot) => {
          const loaded = {};
          snapshot.docs.forEach(doc => { loaded[doc.id] = doc.data().weight; });
          setWeights(loaded);
        });
      }, [user]);

      const saveWeight = async (val) => {
        if (!user) return;
        setIsSaving(true);
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'weights', activeTrackId.toString());
          await setDoc(docRef, { weight: val, updatedAt: new Date().toISOString() }, { merge: true });
        } catch (err) { console.error("Save error:", err); }
        setIsSaving(false);
      };

      return (
        <div className="min-h-screen font-sans text-slate-800 pb-8">
          <header className="bg-slate-800 text-white p-3 shadow-md sticky top-0 z-20">
            <div className="max-w-md mx-auto flex items-center gap-3">
              <svg className="w-8 h-8 drop-shadow-sm" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="20" fill="#0f172a" />
                <path d="M10 45h80v10H10z" fill="#cbd5e1" />
                <rect x="20" y="25" width="12" height="50" rx="3" fill="#ef4444" />
                <rect x="68" y="25" width="12" height="50" rx="3" fill="#ef4444" />
                <rect x="34" y="30" width="8" height="40" rx="2" fill="#94a3b8" />
                <rect x="58" y="30" width="8" height="40" rx="2" fill="#94a3b8" />
              </svg>
              <h1 className="text-lg font-bold tracking-tight">Bodypump Tracker</h1>
            </div>
          </header>

          <main className="max-w-md mx-auto p-3 mt-2 flex flex-col gap-4">
            <div className="w-full flex flex-col gap-1">
              <label className="font-bold text-slate-500 uppercase tracking-wider text-[10px] px-1">Track wählen</label>
              <select value={activeTrackId} onChange={(e) => setActiveTrackId(Number(e.target.value))}
                className="w-full bg-white border border-slate-300 text-sm rounded-lg p-2.5 shadow-sm outline-none">
                {TRACKS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <h2 className="text-md font-bold mb-1 text-slate-900">{activeTrack.name}</h2>
              <p className="text-xs text-slate-500 mb-4">{activeTrack.desc}</p>

              <div className="p-3 bg-slate-50 border border-slate-100 rounded-lg flex items-center justify-between">
                <span className="text-xs font-bold text-slate-700">Gewicht:</span>
                <div className="flex items-center gap-2">
                  <input type="number" step="0.5" value={weights[activeTrackId] || ''}
                    onChange={(e) => setWeights({...weights, [activeTrackId]: e.target.value})}
                    onBlur={(e) => saveWeight(e.target.value)}
                    className="w-16 p-1 border rounded text-center font-bold text-sm outline-none focus:border-red-500" />
                  <span className="text-xs font-bold text-slate-500">kg</span>
                </div>
              </div>
              
              <div className="flex flex-wrap gap-1.5 mt-3">
                {activeTrack.targets.map(t => (
                  <span key={t} className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[10px] font-bold">
                    {MUSCLES[t]}
                  </span>
                ))}
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center">
              <div className="flex justify-center gap-4 w-full">
                <div className="w-1/2 max-w-[120px] flex flex-col items-center">
                  <span className="text-slate-400 font-bold mb-2 uppercase text-[9px]">Vorne</span>
                  <FrontBody targets={activeTrack.targets} />
                </div>
                <div className="w-1/2 max-w-[120px] flex flex-col items-center">
                  <span className="text-slate-400 font-bold mb-2 uppercase text-[9px]">Hinten</span>
                  <BackBody targets={activeTrack.targets} />
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
